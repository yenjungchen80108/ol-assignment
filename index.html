<!doctype html>
<html>
  <head>
    <title>OL Multiple Markers</title>
    <script src="https://cdn.jsdelivr.net/npm/ol@v7.1.0/dist/ol.js"></script>
    <style>
      #map {
        width: 700px;
        height: 500px;
        border: 1px solid #ff0000;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <script>
      let map;
      let vectorSource;
      let vectorLayer;

      function initMap() {
        vectorSource = new ol.source.Vector();

        vectorLayer = new ol.layer.Vector({
          source: vectorSource,
        });

        map = new ol.Map({
          target: "map",
          layers: [
            new ol.layer.Tile({
              source: new ol.source.OSM(),
            }),
            vectorLayer,
          ],
          view: new ol.View({
            center: ol.proj.fromLonLat([-118.28538, 34.0205363]),
            zoom: 15,
            maxZoom: 18,
          }),
        });
      }

      function addMarker(lat, lon, name) {
        const feature = new ol.Feature({
          geometry: new ol.geom.Point(ol.proj.fromLonLat([lon, lat])),
          name: name,
        });

        feature.setStyle(
          new ol.style.Style({
            image: new ol.style.Circle({
              radius: 6,
              fill: new ol.style.Fill({
                color: "red", // ← 改顏色
              }),
              stroke: new ol.style.Stroke({
                color: "white",
                width: 2,
              }),
            }),
          }),
        );

        vectorSource.addFeature(feature);
      }

      function fitMapToMarkers() {
        const extent = vectorSource.getExtent();

        if (extent && !ol.extent.isEmpty(extent)) {
          map.getView().fit(extent, {
            padding: [50, 50, 50, 50],
            maxZoom: 16,
            duration: 800,
          });
        }
      }

      async function loadDataAndPlot() {
        try {
          const response = await fetch("./OL.json");
          const rawData = await response.json();

          localStorage.setItem("OL.json", JSON.stringify(rawData));

          const storedData = JSON.parse(localStorage.getItem("OL.json"));

          for (const [placeName, coords] of Object.entries(storedData)) {
            addMarker(coords.latitude, coords.longitude, placeName);
          }

          fitMapToMarkers();
        } catch (err) {
          console.error("Error loading OL.json:", err);
        }
      }

      initMap();
      loadDataAndPlot();

      map.on("click", function (evt) {
        map.forEachFeatureAtPixel(evt.pixel, function (feature) {
          alert(feature.get("name"));
        });
      });
    </script>
  </body>
</html>
